# 开发环境基础设施（Docker Compose）。
#
# 本文件仅用于本地开发与集成测试，提供 PostgreSQL、Redis、MinIO、OpenTelemetry
# 等依赖（随 A-016～A-019 逐个加入）。生产部署使用独立的 Compose 与 Secret 注入
# （见阶段 K），不直接复用本文件的开发凭据。
#
# 安全约定（SPEC.md 第 4.2 节）：
# - 端口仅绑定到 127.0.0.1，避免内部基础设施端口暴露到公共网络；
# - 开发凭据为非生产默认值，生产凭据通过环境变量在 K-011 注入。
#
# 使用：
#   docker compose -f infra/docker-compose.dev.yml --env-file infra/.env.dev up -d
# 健康检查就绪后，业务进程可按 infra/.env.dev 中的连接串接入。
services:
  postgres:
    # PostgreSQL 17：业务状态唯一事实来源（SPEC.md 第 2.4、7 节）。
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tender}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tender_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tender}
    ports:
      # 仅本地回环绑定，内部端口不公开（SPEC.md 第 4.2 节）。
      - "127.0.0.1:5432:5432"
    volumes:
      # 命名数据卷：容器重启后测试数据仍存在（A-016 验证点）。
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready 探测数据库就绪；用于 Compose 依赖与 A-016 健康检查验证。
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  redis:
    # Redis 7：Celery broker 与缓存，不承载权威业务状态（SPEC.md 第 2.4 节）。
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # 仅本地回环绑定。
      - "127.0.0.1:6379:6379"
    volumes:
      # 持久化 AOF，便于验证“重启后数据仍存在”的行为约定（A-017）。
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    restart: unless-stopped

  minio:
    # MinIO：S3 兼容对象存储；对象默认私有，仅通过短期授权地址访问
    # （SPEC.md 第 4.2、12.3 节）。开发镜像用 latest，生产在阶段 K 锁定版本。
    image: quay.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_dev_password}
    ports:
      # S3 API 与控制台均仅回环绑定。
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  minio_init:
    # 一次性初始化容器：创建私有 bucket。MinIO 新建 bucket 默认 private，
    # 不设置任何 public 读策略，满足“未签名请求无法读取私有对象”（A-018）。
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_dev_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-tender}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb -p "local/$${MINIO_BUCKET}" || true &&
        mc anonymous set none "local/$${MINIO_BUCKET}" || true

  otel_collector:
    # OpenTelemetry Collector：接收 OTLP，开发期用 debug 导出器打印到控制台。
    # Collector 为 distroless 镜像，无 shell/curl，故以 health_check 扩展
    # （:13133）提供就绪探测，容器级 healthcheck 由其扩展承载。
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      # OTLP gRPC / HTTP 仅回环绑定。
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:13133:13133"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
