# Alembic configuration (Phase B+).
# The DB URL is read by migrations/env.py from DATABASE_URL (typed config), so no
# credentials are stored in this file. Migration commands:
#   uv run alembic upgrade head
#   uv run alembic downgrade -1
# Migrations are explicit, auditable steps; they are NOT run implicitly in the app
# request path (SPEC.md 13.3).
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
